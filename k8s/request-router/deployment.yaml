apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-router
  namespace: inference
  labels:
    app.kubernetes.io/name: request-router
    app.kubernetes.io/part-of: do-agentic-inference
    app.kubernetes.io/component: router
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: request-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: request-router
        app.kubernetes.io/part-of: do-agentic-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: /metrics
    spec:
      imagePullSecrets:
        - name: registry-inference
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: request-router
                topologyKey: kubernetes.io/hostname
      containers:
        - name: router
          image: registry.digitalocean.com/inference/router:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: request-router-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
