apiVersion: v1
kind: Service
metadata:
  name: vllm-prefill
  namespace: inference
  labels:
    app.kubernetes.io/name: vllm-prefill
    app.kubernetes.io/part-of: do-agentic-inference
    inference.do/pool: prefill
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm-prefill
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8001
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-decode
  namespace: inference
  labels:
    app.kubernetes.io/name: vllm-decode
    app.kubernetes.io/part-of: do-agentic-inference
    inference.do/pool: decode
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm-decode
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8001
      targetPort: metrics
      protocol: TCP
