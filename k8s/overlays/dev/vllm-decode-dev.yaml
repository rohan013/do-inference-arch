apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-decode-config
  namespace: inference
data:
  TENSOR_PARALLEL_SIZE: "1"
  MAX_NUM_SEQS: "64"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-decode
  namespace: inference
spec:
  template:
    spec:
      nodeSelector:
        inference.do/pool: decode
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: inference.do/pool
          operator: Equal
          value: decode
          effect: NoSchedule
      containers:
        - name: vllm
          args:
            - |
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model "${MODEL_NAME}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --tensor-parallel-size "${TENSOR_PARALLEL_SIZE}" \
                --max-model-len "${MAX_MODEL_LEN}" \
                --max-num-seqs "${MAX_NUM_SEQS}" \
                --enable-prefix-caching \
                --port 8000 \
                --host 0.0.0.0 \
                --disable-log-requests
          resources:
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 48Gi
              nvidia.com/gpu: "1"