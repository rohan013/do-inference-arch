apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: checkpoint-cache-init
  namespace: inference
  labels:
    app.kubernetes.io/name: checkpoint-cache-init
    app.kubernetes.io/part-of: do-agentic-inference
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: checkpoint-cache-init
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkpoint-cache-init
    spec:
      hostPID: true
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: inference.do/pool
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        inference.do/pool: prefill
      initContainers:
        - name: ensure-mount
          image: busybox:1.37
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /host/mnt/nvme/checkpoints
              chmod 1777 /host/mnt/nvme/checkpoints
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-nvme
              mountPath: /host/mnt/nvme
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-nvme
          hostPath:
            path: /mnt/nvme
            type: DirectoryOrCreate
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: checkpoint-cache-init-decode
  namespace: inference
  labels:
    app.kubernetes.io/name: checkpoint-cache-init-decode
    app.kubernetes.io/part-of: do-agentic-inference
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: checkpoint-cache-init-decode
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkpoint-cache-init-decode
    spec:
      hostPID: true
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: inference.do/pool
          operator: Equal
          value: decode
          effect: NoSchedule
      nodeSelector:
        inference.do/pool: decode
      initContainers:
        - name: ensure-mount
          image: busybox:1.37
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /host/mnt/nvme/checkpoints
              chmod 1777 /host/mnt/nvme/checkpoints
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-nvme
              mountPath: /host/mnt/nvme
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
            limits:
              cpu: 10m
              memory: 16Mi
      volumes:
        - name: host-nvme
          hostPath:
            path: /mnt/nvme
            type: DirectoryOrCreate
