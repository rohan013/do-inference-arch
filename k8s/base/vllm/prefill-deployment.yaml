apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-prefill-config
  namespace: inference
  labels:
    app.kubernetes.io/name: vllm-prefill
    app.kubernetes.io/part-of: do-agentic-inference
data:
  MODEL_NAME: meta-llama/Meta-Llama-3.1-8B-Instruct
  SERVED_MODEL_NAME: llama-3.1-8b
  TENSOR_PARALLEL_SIZE: "8"
  MAX_MODEL_LEN: "32768"
  CHUNKED_PREFILL_SIZE: "4096"
  # DO Spaces URI for BF16 weights fallback (Phase 4).
  MODEL_WEIGHTS_URI: s3://do-spaces-inference-weights/models/llama-3.1-8b/
  # Local NVMe cache mount path on GPU Droplets.
  CHECKPOINT_CACHE_PATH: /mnt/nvme/checkpoints
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-prefill
  namespace: inference
  labels:
    app.kubernetes.io/name: vllm-prefill
    app.kubernetes.io/part-of: do-agentic-inference
    inference.do/pool: prefill
    inference.do/phase: prefill
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm-prefill
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm-prefill
        app.kubernetes.io/part-of: do-agentic-inference
        inference.do/pool: prefill
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: /metrics
    spec:
      # Label GPU node pools at cluster creation: inference.do/pool=prefill
      nodeSelector:
        inference.do/pool: prefill
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: inference.do/pool
          operator: Equal
          value: prefill
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.8.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vllm-prefill-config
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: VLLM_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VLLM_KV_CACHE_ROLE
              value: producer
            - name: VLLM_KV_TRANSFER_BACKEND
              value: nccl
            - name: NCCL_SOCKET_IFNAME
              value: eth1
          command:
            - /bin/sh
            - -ec
          args:
            - |
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model "${MODEL_NAME}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --tensor-parallel-size "${TENSOR_PARALLEL_SIZE}" \
                --max-model-len "${MAX_MODEL_LEN}" \
                --enable-chunked-prefill \
                --port 8000 \
                --host 0.0.0.0 \
                --disable-log-requests
          resources:
            requests:
              cpu: "32"
              memory: 256Gi
              nvidia.com/gpu: "8"
            limits:
              cpu: "64"
              memory: 512Gi
              nvidia.com/gpu: "8"
          volumeMounts:
            - name: checkpoint-cache
              mountPath: /mnt/nvme/checkpoints
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: checkpoint-cache
          hostPath:
            path: /mnt/nvme/checkpoints
            type: DirectoryOrCreate
