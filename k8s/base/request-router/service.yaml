apiVersion: v1
kind: Service
metadata:
  name: request-router
  namespace: inference
  labels:
    app.kubernetes.io/name: request-router
    app.kubernetes.io/part-of: do-agentic-inference
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: request-router
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
