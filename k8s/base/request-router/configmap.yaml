apiVersion: v1
kind: ConfigMap
metadata:
  name: request-router-config
  namespace: inference
  labels:
    app.kubernetes.io/name: request-router
    app.kubernetes.io/part-of: do-agentic-inference
data:
  # Route to disaggregated prefill pool when prompt exceeds this token count.
  # Spec rationale: KV transfer (~270ms @ 25Gbps) only pays off above 2K tokens.
  PROMPT_LEN_DISAGGREGATE_THRESHOLD: "2048"

  # Chunk size for long-prompt prefill (tokens).
  CHUNKED_PREFILL_SIZE: "4096"

  # Scheduler token budget — matches agentic_scheduler max_batch_tokens in spec.
  MAX_BATCH_TOKENS: "32768"

  # Upstream vLLM pool endpoints (OpenAI-compatible).
  PREFILL_SERVICE_URL: http://vllm-prefill:8000
  DECODE_SERVICE_URL: http://vllm-decode:8000

  # Prefix cache / KV page table metadata (DO Managed Redis in production).
  REDIS_URL: redis://redis:6379/0

  # Default served model name exposed to clients.
  DEFAULT_MODEL: llama-3.1-8b

  # Prometheus scrape port for application metrics (see code/telemetry.py).
  METRICS_PORT: "9090"

  # Router log level.
  LOG_LEVEL: info

  # Load-aware routing — poll vLLM /metrics and spill short prompts to prefill when decode is saturated.
  POOL_METRICS_POLL_INTERVAL_SECONDS: "2"
  DECODE_QUEUE_SATURATION_THRESHOLD: "16"
  PREFILL_SPILLOVER_ENABLED: "true"
