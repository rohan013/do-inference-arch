apiVersion: v1
kind: Service
metadata:
  name: ingress-lb
  namespace: inference
  labels:
    app.kubernetes.io/name: ingress-lb
    app.kubernetes.io/part-of: do-agentic-inference
  annotations:
    # DigitalOcean Load Balancer integration for DOKS.
    service.beta.kubernetes.io/do-loadbalancer-name: inference-api-lb
    service.beta.kubernetes.io/do-loadbalancer-protocol: http
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-path: /healthz
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-port: "8080"
    service.beta.kubernetes.io/do-loadbalancer-size-slug: lb-small
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: request-router
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
